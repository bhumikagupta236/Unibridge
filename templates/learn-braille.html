<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Braille</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide.js"></script>
    <style>
      body { font-family: 'Inter', sans-serif; }
      .braille-font-large {
        font-family: 'Courier New', Courier, monospace;
        font-size: 4rem;
        letter-spacing: 2px;
      }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen antialiased">


    <header class="px-6 py-2 max-w-5xl mx-auto w-full">
        <nav class="flex items-center">
            <a href="/"
               class="flex items-center text-gray-400 hover:text-white transition-colors rounded-full p-2 focus:outline-none focus:ring-4 focus:ring-indigo-500"
               aria-label="Back to home">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
                <span class="ml-2 font-semibold">Home</span>
            </a>
        </nav>
    </header>


    <main class="max-w-xl mx-auto px-6 pb-6 pt-0">
        <h1 class="text-3xl font-bold text-center">Learn Braille</h1>
        <p class="text-base text-gray-300 mt-2 text-center">
            Use the "Next" and "Previous" buttons to study the alphabet.
        </p>


        <div class="mt-8 bg-gray-800 p-5 rounded-2xl shadow-lg">


            <h2 id="lesson-title" class="text-4xl font-bold text-center text-indigo-400">...</h2>


            <div class="mt-4 aspect-video bg-gray-700 rounded-lg flex items-center justify-center">
                <p id="lesson-braille" class="braille-font-large text-white">...</p>
            </div>


            <p id="lesson-description" class="text-gray-300 text-center mt-3 text-base">
                Loading lessons...
            </p>
        </div>


        <div class="mt-6 flex items-center justify-between gap-4">
            <button id="prev-button"
                    aria-label="Previous lesson"
                    class="flex items-center justify-center gap-2 min-w-[140px] bg-gray-700 text-white py-2.5 px-5 rounded-lg font-semibold hover:bg-gray-600 transition-colors focus:outline-none focus:ring-4 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                <span>Previous</span>
            </button>
            <button id="next-button"
                    aria-label="Next lesson"
                    class="flex items-center justify-center gap-2 min-w-[140px] bg-indigo-600 text-white py-2.5 px-5 rounded-lg font-semibold hover:bg-indigo-700 transition-colors focus:outline-none focus:ring-4 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed">
                <span>Next</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>
    </main>


    <script>

        let lessons = [];
        let currentLessonIndex = 0;

        const titleEl = document.getElementById('lesson-title');
        const brailleEl = document.getElementById('lesson-braille');
        const descriptionEl = document.getElementById('lesson-description');
        const prevButton = document.getElementById('prev-button');
        const nextButton = document.getElementById('next-button');

        function showLesson(index) {
            if (index < 0 || index >= lessons.length) {
                return;
            }

            const lesson = lessons[index];
            titleEl.textContent = lesson.name;
            brailleEl.textContent = lesson.braille;
            descriptionEl.textContent = lesson.description;

            currentLessonIndex = index;

            prevButton.disabled = (index === 0);
            nextButton.disabled = (index === lessons.length - 1);
        }

        prevButton.addEventListener('click', () => {
            if (currentLessonIndex > 0) {
                showLesson(currentLessonIndex - 1);
            }
        });

        nextButton.addEventListener('click', () => {
            if (currentLessonIndex < lessons.length - 1) {
                showLesson(currentLessonIndex + 1);
            }
        });

        function loadLessons() {
            try {
                lessons = [
                    { "name": "A", "braille": "⠁", "description": "Dot 1" },
                    { "name": "B", "braille": "⠃", "description": "Dots 1, 2" },
                    { "name": "C", "braille": "⠉", "description": "Dots 1, 4" },
                    { "name": "D", "braille": "⠙", "description": "Dots 1, 4, 5" },
                    { "name": "E", "braille": "⠑", "description": "Dots 1, 5" },
                    { "name": "F", "braille": "⠋", "description": "Dots 1, 2, 4" },
                    { "name": "G", "braille": "⠛", "description": "Dots 1, 2, 4, 5" },
                    { "name": "H", "braille": "⠓", "description": "Dots 1, 2, 5" },
                    { "name": "I", "braille": "⠊", "description": "Dots 2, 4" },
                    { "name": "J", "braille": "⠚", "description": "Dots 2, 4, 5" },
                    { "name": "K", "braille": "⠅", "description": "Dots 1, 3" },
                    { "name": "L", "braille": "⠇", "description": "Dots 1, 2, 3" },
                    { "name": "M", "braille": "⠍", "description": "Dots 1, 3, 4" },
                    { "name": "N", "braille": "⠝", "description": "Dots 1, 3, 4, 5" },
                    { "name": "O", "braille": "⠕", "description": "Dots 1, 3, 5" },
                    { "name": "P", "braille": "⠏", "description": "Dots 1, 2, 3, 4" },
                    { "name": "Q", "braille": "⠟", "description": "Dots 1, 2, 3, 4, 5" },
                    { "name": "R", "braille": "⠗", "description": "Dots 1, 2, 3, 5" },
                    { "name": "S", "braille": "⠎", "description": "Dots 2, 3, 4" },
                    { "name": "T", "braille": "⠞", "description": "Dots 2, 3, 4, 5" },
                    { "name": "U", "braille": "⠥", "description": "Dots 1, 3, 6" },
                    { "name": "V", "braille": "⠧", "description": "Dots 1, 2, 3, 6" },
                    { "name": "W", "braille": "⠺", "description": "Dots 2, 4, 5, 6" },
                    { "name": "X", "braille": "⠭", "description": "Dots 1, 3, 4, 6" },
                    { "name": "Y", "braille": "⠽", "description": "Dots 1, 3, 4, 5, 6" },
                    { "name": "Z", "braille": "⠵", "description": "Dots 1, 3, 5, 6" }
                ];


                if (lessons.length > 0) {
                    showLesson(0);
                } else {
                    titleEl.textContent = "No lessons found.";
                    descriptionEl.textContent = "Data array is empty.";
                }
            } catch (error) {
                console.error('Error loading lessons:', error);
                titleEl.textContent = "Error";
                descriptionEl.textContent = "Could not load lessons. See console for details.";
            }
        }

        window.addEventListener('load', () => {
            try {
                lucide.createIcons();
            } catch (e) {
                console.error("Lucide icons error:", e);
            }

            loadLessons();
        });

    </script>
</body>
</html>
